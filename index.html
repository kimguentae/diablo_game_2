<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIABLO TENNIS CLUB</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>DIABLO TENNIS CLUB GAME TABLE</h1>

<h2>PLAYER (<span id="count">0</span>)</h2>
<div id="playerList"></div>

<h2>FIXED PAIR</h2>
<div class="pairBox">
  <select id="p1"></select>
  <select id="p2"></select>
  <div id="addPair" class="plusBtn">+</div>
</div>

<div id="pairList"></div>

<h2>GAME</h2>
<div class="btnRow">
  <button class="genBtn">1SET</button>
  <button class="genBtn">2SET</button>
  <button class="genBtn">3SET</button>
  <button class="genBtn">4SET</button>
  <button class="genBtn">5SET</button>
</div>

<h2>RESULT</h2>
<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
